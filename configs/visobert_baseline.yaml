# ViSoBERT multi-label baseline on ViGoEmotions (Scenario 1: keep raw emoji).
# Target reproduction: Macro F1 ~ 61.50%, Weighted F1 ~ 63.26%.

model_name: uitnlp/visobert
num_labels: 28

# Tokenization
max_length: 128

# Optimization
batch_size: 64
eval_batch_size: 80
epochs: 12            # ← 10 → 12 (paper dùng 12)
learning_rate: 5.0e-5 # ← 2e-5 → 5e-5 (paper dùng 5e-5)
weight_decay: 0.01
warmup_ratio: 0.1
dropout: 0.2          # ← 0.1 → 0.2 (paper dùng 0.2)
grad_clip: 1.0
grad_accum: 1
seed: 42

# Loss
use_pos_weight: true

# Inference
threshold: 0.5

# Misc
num_workers: 2
log_every: 50

# Paths inside the Modal container.
data_dir: /data
runs_dir: /runs
